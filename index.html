<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe 人臉表情識別系統</title>
    <link rel="stylesheet" href="styles.css">
    <!-- MediaPipe FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>😊 人臉表情識別系統</h1>
            <p>實時偵測您的面部表情</p>
        </header>

        <main>
            <div class="camera-section">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn btn-start">🎥 開始識別</button>
                <button id="switchBtn" class="btn btn-switch" disabled>🔄 切換鏡頭</button>
                <button id="stopBtn" class="btn btn-stop" disabled>⏹️ 停止</button>
            </div>

            <div class="results">
                <div class="emotion-display">
                    <div id="mainEmotion" class="main-emotion">
                        <span class="emoji">😐</span>
                        <span class="emotion-text">等待中</span>
                    </div>
                </div>

                <div class="emotion-bars">
                    <div class="emotion-bar">
                        <label>😊 喜悅</label>
                        <div class="bar-container">
                            <div id="happy" class="bar" style="width: 0%"></div>
                        </div>
                        <span id="happyValue">0%</span>
                    </div>

                    <div class="emotion-bar">
                        <label>😢 悲傷</label>
                        <div class="bar-container">
                            <div id="sad" class="bar" style="width: 0%"></div>
                        </div>
                        <span id="sadValue">0%</span>
                    </div>

                    <div class="emotion-bar">
                        <label>😠 憤怒</label>
                        <div class="bar-container">
                            <div id="angry" class="bar" style="width: 0%"></div>
                        </div>
                        <span id="angryValue">0%</span>
                    </div>

                    <div class="emotion-bar">
                        <label>😨 驚恐</label>
                        <div class="bar-container">
                            <div id="fear" class="bar" style="width: 0%"></div>
                        </div>
                        <span id="fearValue">0%</span>
                    </div>

                    <div class="emotion-bar">
                        <label>🤢 厭惡</label>
                        <div class="bar-container">
                            <div id="disgusted" class="bar" style="width: 0%"></div>
                        </div>
                        <span id="disgustedValue">0%</span>
                    </div>

                    <div class="emotion-bar">
                        <label>😐 中立</label>
                        <div class="bar-container">
                            <div id="neutral" class="bar" style="width: 0%"></div>
                        </div>
                        <span id="neutralValue">0%</span>
                    </div>
                </div>

                <div class="info-box">
                    <p id="status">點擊「開始識別」按鈕開始</p>
                </div>
            </div>
        </main>

        <footer>
            <p>💡 提示：請確保光線充足，將臉部置於攝像頭前方</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
